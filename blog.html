<style>
  :root{
    --paper:#F5F7F5;--paper-2:#FFFFFF;--ink:#0B1E26;--ink-soft:#51666E;--ink-faint:#8A9AA0;
    --line:#DCE3E1;--accent:#0E7C86;--accent-deep:#0A5A62;
    --spectrum:linear-gradient(90deg,#2F6BE0 0%,#0E9AA0 33%,#46B85C 64%,#E59A2E 100%);
    --maxw:880px;--gut:clamp(1.25rem,5vw,4rem);
    --f-display:"Spectral",Georgia,serif;--f-body:"IBM Plex Sans",system-ui,sans-serif;--f-mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--f-body);font-size:17px;line-height:1.7;-webkit-font-smoothing:antialiased}
  a{color:var(--accent-deep);text-decoration:none}a:hover{text-decoration:underline}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--gut)}
  .eyebrow{font-family:var(--f-mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 1rem}
  h1,h2,h3{font-family:var(--f-display);font-weight:500;line-height:1.14;letter-spacing:-.01em}

  .nav{position:sticky;top:0;z-index:50;background:rgba(245,247,245,.82);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;gap:1rem;height:78px}
  .brand{display:flex;align-items:center}
  .brand .logo{height:42px;width:auto;display:block}
  .nav-links{display:flex;gap:1.6rem;align-items:center}
  .nav-links a{font-family:var(--f-mono);font-size:.8rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink)}
  .nav-links a:hover{color:var(--accent);text-decoration:none}

  .head{padding-block:clamp(3.5rem,9vw,6rem) 2rem}
  .head h1{font-size:clamp(2.2rem,5vw,3.6rem);margin:0}
  .spectrum-rule{height:3px;background:var(--spectrum);border:0;border-radius:3px;margin:2rem 0 0}

  .posts{padding-block:1rem 5rem}
  .post{padding:2rem 0;border-bottom:1px solid var(--line)}
  .post .meta{font-family:var(--f-mono);font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 .6rem}
  .post h2{font-size:1.55rem;font-weight:600;margin:0 0 .7rem}
  .post p{color:var(--ink-soft);margin:0 0 .7rem}
  .post .read{font-family:var(--f-mono);font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink)}

  .empty{padding:3rem 0 5rem;color:var(--ink-soft)}
  .empty .card{border:1px dashed var(--line);border-radius:12px;padding:2.5rem;background:var(--paper-2);text-align:center}
  .empty h2{font-size:1.5rem;margin:0 0 .6rem}

  footer{background:var(--ink);color:rgba(255,255,255,.6);border-top:1px solid rgba(255,255,255,.12)}
  .foot-inner{display:flex;flex-wrap:wrap;justify-content:space-between;gap:1rem;padding-block:1.8rem;font-family:var(--f-mono);font-size:.78rem}
  .foot-inner nav{display:flex;gap:1.3rem;flex-wrap:wrap}
  .foot-inner a{color:rgba(255,255,255,.7)}.foot-inner a:hover{color:#fff}
  @media(max-width:820px){.nav-links{gap:1rem}.nav-links a:not(.home){display:none}}
</style>
</head>
